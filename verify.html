<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Portal</title>
    <style>
        body { background:#0b0b0b; color:white; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
        .card { background:#111; padding:25px; border-radius:15px; border:2px solid #ffcc00; width:90%; max-width:350px; text-align:center; }
        .title { color:#ffcc00; font-weight:bold; margin-bottom:5px; font-size:20px; }
        .subtitle { font-size:12px; color:#ccc; margin-bottom:15px; }
        .code-box { border:1px dashed #ffcc00; padding:15px; margin-bottom:15px; border-radius:5px; }
        .verify-input { width:100%; padding:12px; border-radius:5px; border:none; margin-bottom:10px; text-align:center; }
        .btn { width:100%; padding:12px; border:none; border-radius:5px; background:#ffcc00; font-weight:bold; cursor:pointer; color:black; }
        #resultBox { margin-top:15px; padding:10px; border-radius:5px; display:none; font-weight:bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="brandDisplay" class="title">AUTHENTICATION PORTAL</div>
    <div class="subtitle">MANUAL VERIFICATION CODE</div>
    <div class="code-box">
        <div id="manualCodeDisplay" style="color:#0f0; font-weight:bold;">SCAN QR CODE</div>
    </div>
    <input type="text" id="verifyInput" class="verify-input" placeholder="Enter Product Code">
    <button class="btn" onclick="verifyProduct()">VERIFY PRODUCT</button>
    <div id="resultBox"></div>
</div>

<script>
    const products = {
        "ON84P2X": "OPTIMUM NUTRITION",
        "LBR7F29K": "LABRADA NUTRITION"
    };
    for(let i = 1; i <= 100; i++) { products["LBR-" + (1000 + i)] = "LABRADA NUTRITION"; }

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code && products[code.toUpperCase()]) {
            const brand = products[code.toUpperCase()];
            document.getElementById('brandDisplay').innerText = brand;
            document.getElementById('manualCodeDisplay').innerText = code.toUpperCase();
            document.getElementById('verifyInput').value = code.toUpperCase();
        }
    };

    function verifyProduct() {
        let code = document.getElementById('verifyInput').value.trim().toUpperCase();
        let res = document.getElementById('resultBox');
        res.style.display = 'block';

        if (!products[code]) {
            res.style.background = "#400"; res.style.color = "red";
            res.innerHTML = "❌ INVALID CODE";
            return;
        }

        // Update brand name if user typed a valid code manually
        document.getElementById('brandDisplay').innerText = products[code];
        document.getElementById('manualCodeDisplay').innerText = code;

        let count = parseInt(localStorage.getItem("use_" + code)) || 0;
        if (count < 3) {
            count++;
            localStorage.setItem("use_" + code, count);
            res.style.background = "#020"; res.style.color = "#0f0";
            res.innerHTML = "✅ " + products[code] + "<br>Thanks for choosing " + products[code] + "!<br>Verification: " + count + "/3";
        } else {
            res.style.background = "#420"; res.style.color = "#ff0";
            res.innerHTML = "⚠️ ALREADY USED (3/3)";
        }
    }
</script>
</body>
</html>
