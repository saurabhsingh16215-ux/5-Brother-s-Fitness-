/* =========================
QR AUTO DETECT
========================= */

window.onload = function(){

const params =
new URLSearchParams(
window.location.search
);

const code =
params.get("code");

/* VALID QR */

if(
code &&
products[code.toUpperCase()]
){

let p =
products[code.toUpperCase()];

/* FIRST SCREEN */

document.getElementById(
"screenBrand"
).innerText =
p.brand;

/* PORTAL SCREEN */

document.getElementById(
"portalBrand"
).innerText =
p.brand;

/* CODE */

document.getElementById(
"displayCode"
).innerText =
code.toUpperCase();

}

/* INVALID */

else{

document.getElementById(
"screenBrand"
).innerText =
"INVALID PRODUCT QR";

}

};

/* =========================
OPEN WEBSITE
========================= */

function openPortal(){

document.getElementById(
"verifiedScreen"
).style.display =
"none";

document.getElementById(
"portalScreen"
).style.display =
"flex";

}

/* =========================
VERIFY PRODUCT
========================= */

function verifyProduct(){

let input =
document.getElementById(
"verifyInput"
);

let code =
input.value
.trim()
.toUpperCase();

let box =
document.getElementById(
"resultBox"
);

/* VALID */

if(products[code]){

let used =
parseInt(
localStorage.getItem(
"used_"+code
)
) || 0;

/* LIMIT */

if(used >= 2){

box.innerHTML =
"⚠️ ALREADY USED";

box.style.color =
"#ffcc00";

}

/* SUCCESS */

else{

used++;

localStorage.setItem(
"used_"+code,
used
);

box.innerHTML =
"✅ VERIFIED<br>" +
products[code].brand +
"<br>Usage: " +
used +
"/2";

box.style.color =
"#00ff00";

}

}

/* INVALID */

else{

box.innerHTML =
"❌ INVALID CODE";

box.style.color =
"red";

}

/* AUTO CLEAR */

input.value = "";

/* AUTO FOCUS */

input.focus();

}
