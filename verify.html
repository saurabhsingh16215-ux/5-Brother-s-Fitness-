<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Verification</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#0b0b0b; color:white; min-height:100vh; }
        #verifiedScreen { display:flex; justify-content:center; align-items:center; height:100vh; padding:20px; }
        .verify-card { background:#111; padding:40px 25px; border-radius:30px; width:100%; max-width:430px; text-align:center; border:3px solid #00ff00; box-shadow:0 0 30px rgba(0,255,0,.25); }
        .brand-name { font-size:34px; font-weight:bold; color:#ffcc00; margin-bottom:15px; }
        .icon { font-size:70px; margin-bottom:15px; }
        .verify-title { font-size:30px; font-weight:bold; color:#00ff00; margin-bottom:12px; }
        .open-btn { background:#ffcc00; color:black; border:none; padding:16px; width:100%; border-radius:14px; font-size:18px; font-weight:bold; cursor:pointer; }
        #portalScreen { display:none; padding:30px 20px; min-height:100vh; }
        .portal-card { max-width:500px; margin:auto; background:#111; padding:35px 25px; border-radius:30px; border:2px solid #ffcc00; text-align:center; }
        .portal-brand { font-size:36px; font-weight:bold; color:#ffcc00; margin-bottom:10px; }
        .verify-input { width:100%; padding:16px; border:none; border-radius:15px; font-size:18px; margin-bottom:15px; text-align:center; }
        .verify-btn { width:100%; padding:16px; border:none; border-radius:15px; background:#ffcc00; font-size:18px; font-weight:bold; cursor:pointer; }
        #resultBox { display:none; margin-top:20px; padding:20px; border-radius:20px; font-size:18px; font-weight:bold; }
    </style>
</head>
<body>

<div id="verifiedScreen">
    <div class="verify-card">
        <div class="brand-name">LABRADA NUTRITION</div>
        <div class="icon">✅</div>
        <div class="verify-title">PRODUCT VERIFIED</div>
        <button class="open-btn" onclick="openPortal()">OPEN WEBSITE</button>
    </div>
</div>

<div id="portalScreen">
    <div class="portal-card">
        <div class="portal-brand">LABRADA NUTRITION</div>
        <input type="text" id="verifyInput" class="verify-input" placeholder="Enter Product Code">
        <button class="verify-btn" onclick="verifyProduct()">VERIFY PRODUCT</button>
        <div id="resultBox"></div>
    </div>
</div>

<script>
    const products = {
        "LBR7F29K": "LABRADA NUTRITION",
        "LMG5P62C": "LABRADA NUTRITION",
        "TRU5MP91": "MUSCLETECH",
        "ON84P2X": "OPTIMUM NUTRITION"
    };

    function openPortal() {
        document.getElementById("verifiedScreen").style.display = "none";
        document.getElementById("portalScreen").style.display = "block";
    }

    function verifyProduct() {
        let input = document.getElementById("verifyInput");
        let code = input.value.trim().toUpperCase();
        let result = document.getElementById("resultBox");
        result.style.display = "block";

        if (products[code]) {
            let key = "usage_" + code;
            let count = parseInt(localStorage.getItem(key)) || 0;

            if (count < 2) {
                count++;
                localStorage.setItem(key, count);
                result.innerHTML = "✅ PRODUCT VERIFIED<br><br>Brand: " + products[code] + "<br>Used: " + count + "/2";
                result.style.background = "#002b00"; result.style.color = "#00ff00"; result.style.border = "2px solid #00ff00";
            } else {
                result.innerHTML = "⚠️ ALERT: CODE ALREADY USED<br><br>Limit exceeded (2/2)";
                result.style.background = "#2b0000"; result.style.color = "#ffcc00"; result.style.border = "2px solid #ffcc00";
            }
        } else {
            result.innerHTML = "❌ INVALID CODE";
            result.style.background = "#2b0000"; result.style.color = "red"; result.style.border = "2px solid red";
        }
        input.value = "";
    }
</script>

</body>
</html>
