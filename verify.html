<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Product Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
min-height:100vh;
}

/* VERIFIED SCREEN */

#verifiedScreen{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.verify-card{
background:#111;
padding:40px 25px;
border-radius:30px;
width:100%;
max-width:430px;
text-align:center;
border:3px solid #00ff00;
box-shadow:0 0 30px rgba(0,255,0,.25);
}

.brand-name{
font-size:34px;
font-weight:bold;
color:#ffcc00;
margin-bottom:15px;
}

.icon{
font-size:70px;
margin-bottom:15px;
}

.verify-title{
font-size:30px;
font-weight:bold;
color:#00ff00;
margin-bottom:12px;
}

.verify-msg{
font-size:18px;
color:#ddd;
margin-bottom:25px;
}

.open-btn{
background:#ffcc00;
color:black;
border:none;
padding:16px;
width:100%;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* PORTAL SCREEN */

#portalScreen{
display:none;
padding:30px 20px;
min-height:100vh;
}

.portal-card{
max-width:500px;
margin:auto;
background:#111;
padding:35px 25px;
border-radius:30px;
border:2px solid #ffcc00;
text-align:center;
}

.portal-brand{
font-size:36px;
font-weight:bold;
color:#ffcc00;
margin-bottom:10px;
}

.portal-product{
font-size:26px;
margin-bottom:10px;
font-weight:bold;
}

.portal-sub{
color:#bbb;
margin-bottom:25px;
font-size:17px;
}

.code-box{
background:#181818;
border:2px dashed #ffcc00;
padding:20px;
border-radius:20px;
margin-bottom:25px;
}

.code-title{
font-size:18px;
margin-bottom:10px;
}

.code{
font-size:28px;
font-weight:bold;
letter-spacing:2px;
color:#00ff00;
}

.verify-input{
width:100%;
padding:16px;
border:none;
border-radius:15px;
font-size:18px;
margin-bottom:15px;
text-align:center;
}

.verify-btn{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#ffcc00;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#resultBox{
display:none;
margin-top:20px;
padding:20px;
border-radius:20px;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<!-- VERIFIED SCREEN -->

<div id="verifiedScreen">

<div class="verify-card">

<div class="brand-name"
id="verifiedBrand">

LABRADA NUTRITION

</div>

<div class="icon">
✅
</div>

<div class="verify-title">

PRODUCT VERIFIED

</div>

<div class="verify-msg">

100% Authentic Product

</div>

<button class="open-btn"
onclick="openPortal()">

OPEN WEBSITE

</button>

</div>

</div>

<!-- PORTAL SCREEN -->

<div id="portalScreen">

<div class="portal-card">

<div class="portal-brand"
id="portalBrand">

LABRADA NUTRITION

</div>

<div class="portal-product"
id="portalProduct">

WHEY PROTEIN
AUTHENTICATION PORTAL

</div>

<div class="portal-sub">

Please Enter Your Product
Code Here

</div>

<div class="code-box">

<div class="code-title">

Manual Verification Code

</div>

<div class="code"
id="manualCode">

LBR7F29K

</div>

</div>

<input
type="text"
id="verifyInput"
class="verify-input"
placeholder="Enter Product Code">

<button
class="verify-btn"
onclick="verifyProduct()">

VERIFY PRODUCT

</button>

<div id="resultBox">

</div>

</div>

</div>

<script>

const products={

"LBR7F29K":{

brand:"LABRADA NUTRITION",
product:"WHEY PROTEIN"

},

"LMG5P62C":{

brand:"LABRADA NUTRITION",
product:"MASS GAINER"

},

"TRU5MP91":{

brand:"MUSCLETECH",
product:"NITRO TECH"

},"PRE9W7K2":{

brand:"MUSCLETECH",
product:"PRE WORKOUT"

},

"ON84P2X":{

brand:"OPTIMUM NUTRITION",
product:"GOLD STANDARD WHEY"

},

"GNC3M78B":{

brand:"GNC",
product:"CREATINE"

},

"MUL4V8T1":{

brand:"GNC",
product:"MULTIVITAMIN"

},

"FIS8O2L9":{

brand:"MUSCLEBLAZE",
product:"FISH OIL"

}

};

let currentCode="";

window.onload=function(){

const params=
new URLSearchParams(
window.location.search
);

const code=params.get("code");

if(code &&
products[code.toUpperCase()]){

currentCode=
code.toUpperCase();

let p=
products[currentCode];

document.getElementById(
"verifiedBrand"
).innerText=
p.brand;

document.getElementById(
"portalBrand"
).innerText=
p.brand;

document.getElementById(
"portalProduct"
).innerText=
p.product+
" AUTHENTICATION PORTAL";

document.getElementById(
"manualCode"
).innerText=
currentCode;

}

else{

currentCode=
"LBR7F29K";

}

};

function openPortal(){

document.getElementById(
"verifiedScreen"
).style.display=
"none";

document.getElementById(
"portalScreen"
).style.display=
"block";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function verifyProduct(){

let input=
document.getElementById(
"verifyInput"
);

let value=
input.value
.trim()
.toUpperCase();

let result=
document.getElementById(
"resultBox"
);

result.style.display=
"block";

if(value===currentCode){

result.innerHTML=
"✅ PRODUCT VERIFIED";

result.style.background=
"#002b00";

result.style.color=
"#00ff00";

result.style.border=
"2px solid #00ff00";

}

else{

result.innerHTML=
"❌ PRODUCT FAILED";

result.style.background=
"#2b0000";

result.style.color=
"red";

result.style.border=
"2px solid red";

}

input.value="";

}

</script>

</body>
</html>
